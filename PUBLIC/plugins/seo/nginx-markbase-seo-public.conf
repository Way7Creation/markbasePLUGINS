# Markbase SEO — proxy публичных файлов на домен внешнего сайта.
# Замените MARKBASE_SEO_SLUG на значение MARKBASE_SEO_SLUG / project_slug из dashboard.
# Документация: markbase.ru/docs/2026api/SEO/01_EXTERNAL_SITE_HEADLESS_INTEGRATION.md §5

# include /etc/nginx/snippets/markbase-seo-public.conf;

location = /robots.txt {
    proxy_pass https://seo.markbase.ru/api/seo/v1/public/MARKBASE_SEO_SLUG/robots.txt;
    proxy_ssl_server_name on;
    proxy_set_header Host seo.markbase.ru;
    proxy_cache_valid 200 5m;
}

location = /sitemap.xml {
    proxy_pass https://seo.markbase.ru/api/seo/v1/public/MARKBASE_SEO_SLUG/sitemap.xml;
    proxy_ssl_server_name on;
    proxy_set_header Host seo.markbase.ru;
    proxy_cache_valid 200 5m;
}

location = /ai.txt {
    proxy_pass https://seo.markbase.ru/api/seo/v1/public/MARKBASE_SEO_SLUG/ai.txt;
    proxy_ssl_server_name on;
    proxy_set_header Host seo.markbase.ru;
}

location = /llms.txt {
    proxy_pass https://seo.markbase.ru/api/seo/v1/public/MARKBASE_SEO_SLUG/llms.txt;
    proxy_ssl_server_name on;
    proxy_set_header Host seo.markbase.ru;
}

location = /llm-sitemap.xml {
    proxy_pass https://seo.markbase.ru/api/seo/v1/public/MARKBASE_SEO_SLUG/llm-sitemap.xml;
    proxy_ssl_server_name on;
    proxy_set_header Host seo.markbase.ru;
}
